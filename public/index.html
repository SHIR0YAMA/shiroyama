<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiroyama Files</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #282a36; color: #f8f8f2; margin: 0; padding: 20px; }
        .container { max-width: 960px; margin: auto; background-color: #44475a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        h1 { color: #bd93f9; }
        
        /* Estilos para os botões de navegação */
        .navigation-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .nav-button {
            background: none;
            border: 2px solid #6272a4;
            color: #f8f8f2;
            font-size: 24px; /* Tamanho da seta */
            line-height: 1;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .nav-button:disabled {
            color: #6272a4;
            border-color: #3b3e50;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .nav-button:not(:disabled):hover {
            background-color: #6272a4;
            color: #f8f8f2;
        }
        /* --- */

        #breadcrumb { padding: 10px 15px; background-color: #6272a4; border-radius: 5px; font-size: 16px; }
        #breadcrumb a { color: #f8f8f2; text-decoration: none; font-weight: bold; }
        #breadcrumb a:hover { text-decoration: underline; color: #ff79c6; }
        
        /* Estilo da tabela de arquivos */
        .file-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .file-table th { text-align: left; padding: 12px 15px; border-bottom: 2px solid #6272a4; color: #50fa7b; }
        .file-table td { padding: 12px 15px; border-bottom: 1px solid #3b3e50; }
        .file-table tr:last-child td { border-bottom: none; }
        .file-table tr:hover { background-color: #3b3e50; }
        .file-table a { color: #8be9fd; text-decoration: none; }
        .file-table a:hover { text-decoration: underline; }
        .file-item-name { display: flex; align-items: center; gap: 10px; }
        .download-col { text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shiroyama Files</h1>
        
        <div class="navigation-controls">
            <button id="back-button" class="nav-button" title="Voltar">←</button>
            <button id="forward-button" class="nav-button" title="Avançar">→</button>
        </div>

        <div id="breadcrumb">Carregando...</div>
        
        <table class="file-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th class="download-col"></th>
                </tr>
            </thead>
            <tbody id="file-list-body">
                <tr>
                    <td colspan="2">Carregando...</td>
                </tr>
            </tbody>
        </table>

    </div>
    <script src="/script.js"></script>
</body>
</html>

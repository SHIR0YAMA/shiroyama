<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiroyama Files</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #282a36; color: #f8f8f2; margin: 0; padding: 20px; }
        .container { max-width: 960px; margin: auto; }
        a { color: #8be9fd; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { background-color: #6272a4; border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background-color 0.2s, opacity 0.2s; }
        button:hover { background-color: #ff79c6; }
        button:disabled { background-color: #44475a; cursor: not-allowed; opacity: 0.6; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 20px; background-color: #44475a; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        header h1 { color: #bd93f9; margin: 0; font-size: 24px; }
        header h1 a { color: #bd93f9; }
        header nav { display: flex; align-items: center; gap: 20px; }
        header nav a { font-weight: bold; }
        header nav span { color: #f1fa8c; }
        
        main { background-color: #44475a; padding: 20px; border-radius: 8px; min-height: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .auth-form { max-width: 400px; margin: 40px auto; }
        .auth-form h2 { text-align: center; color: #50fa7b; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #6272a4; background-color: #282a36; color: #f8f8f2; box-sizing: border-box; font-size: 16px; }
        
        #bulk-actions-container { display: none; margin-bottom: 15px; padding: 10px; background-color: #3b3e50; border-radius: 5px; border: 1px solid #6272a4; }

        .file-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .file-table th, .file-table td { padding: 12px 15px; border-bottom: 1px solid #3b3e50; }
        .file-table th { text-align: left; border-bottom: 2px solid #6272a4; color: #50fa7b; }
        .size-col, .download-col, .actions-col { text-align: right; }
        .file-table td { word-break: break-all; }
        .file-table tr:last-child td { border-bottom: none; }
        .file-table tr:hover { background-color: #3b3e50; }
        .file-item-name { display: flex; align-items: center; gap: 10px; }
        .admin-actions button { margin-left: 10px; padding: 5px 10px; font-size: 12px; }

        /* --- INÍCIO: ESTILOS ADICIONADOS PARA A FASE 2 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0s 0.3s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; transition-delay: 0s; }
        .modal-content {
            background-color: #44475a; padding: 30px; border-radius: 8px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform: scale(0.9); transition: transform 0.3s ease;
            position: relative;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-content h2 { margin-top: 0; color: #8be9fd; }
        .modal-content p { margin-bottom: 25px; line-height: 1.6; }
        .modal-actions { display: flex; justify-content: center; gap: 15px; }
        .modal-close-btn {
            position: absolute; top: 5px; right: 15px;
            font-size: 30px; font-weight: bold; color: #bd93f9;
            cursor: pointer; transition: color 0.2s ease;
        }
        .modal-close-btn:hover { color: #ff79c6; }
        #notification-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        .toast {
            background-color: #282a36; color: #f8f8f2; padding: 15px 25px;
            border-radius: 5px; box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            border-left: 5px solid #6272a4;
            opacity: 0; transform: translateX(120%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { border-left-color: #50fa7b; }
        .toast.error { border-left-color: #ff5555; }
        .toast.info { border-left-color: #8be9fd; }
        /* --- FIM: ESTILOS ADICIONADOS PARA A FASE 2 --- */

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/#/">Shiroyama Files</a></h1>
            <nav id="main-nav"></nav>
        </header>
        <main id="main-content"></main>
    </div>

    <!-- INÍCIO: HTML ADICIONADO PARA A FASE 2 -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-close-btn" class="modal-close-btn">×</span>
            <h2>Ação Necessária</h2>
            <p>Para receber este arquivo, você precisa ter uma conta e estar logado.</p>
            <div class="modal-actions">
                <button id="modal-login-btn">Fazer Login</button>
                <button id="modal-register-btn">Criar Conta</button>
            </div>
        </div>
    </div>
    <div id="notification-container"></div>
    <!-- FIM: HTML ADICIONADO PARA A FASE 2 -->
    
    <script src="/script.js"></script>
</body>
</html>

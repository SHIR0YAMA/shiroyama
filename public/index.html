<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiroyama Files</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #282a36; color: #f8f8f2; margin: 0; padding: 20px; }
        .container { max-width: 960px; margin: auto; }
        a { color: #8be9fd; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { background-color: #6272a4; border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #ff79c6; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 20px; background-color: #44475a; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        header h1 { color: #bd93f9; margin: 0; font-size: 24px; }
        header h1 a { color: #bd93f9; }
        header nav { display: flex; align-items: center; gap: 20px; }
        header nav a { font-weight: bold; }
        header nav span { color: #f1fa8c; }
        
        main { background-color: #44475a; padding: 20px; border-radius: 8px; min-height: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .auth-form { max-width: 400px; margin: 40px auto; }
        .auth-form h2 { text-align: center; color: #50fa7b; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #6272a4; background-color: #282a36; color: #f8f8f2; box-sizing: border-box; font-size: 16px; }
        
        #bulk-actions-container { display: none; margin-bottom: 15px; padding: 10px; background-color: #3b3e50; border-radius: 5px; border: 1px solid #6272a4; }

        .file-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .file-table th, .file-table td { padding: 12px 15px; border-bottom: 1px solid #3b3e50; }
        .file-table th { text-align: left; border-bottom: 2px solid #6272a4; color: #50fa7b; }
        .size-col, .download-col, .actions-col { text-align: right; }
        .file-table td { word-break: break-all; }
        .file-table tr:last-child td { border-bottom: none; }
        .file-table tr:hover { background-color: #3b3e50; }
        .file-item-name { display: flex; align-items: center; gap: 10px; }
        .admin-actions button { margin-left: 10px; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/#/">Shiroyama Files</a></h1>
            <nav id="main-nav"></nav>
        </header>
        <main id="main-content"></main>
    </div>
    <script src="/script.js"></script>
</body>
</html>

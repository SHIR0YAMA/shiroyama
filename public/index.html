<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Arquivos</title>
    <style>
        body { font-family: sans-serif; background-color: #282a36; color: #f8f8f2; margin: 20px; }
        .container { max-width: 900px; margin: auto; background-color: #44475a; padding: 20px; border-radius: 8px; }
        #breadcrumb { padding: 10px 15px; background-color: #6272a4; border-radius: 5px; margin-bottom: 20px; }
        #breadcrumb a { color: #f8f8f2; text-decoration: none; font-weight: bold; }
        #breadcrumb a:hover { text-decoration: underline; }
        #file-list { list-style: none; padding: 0; }
        #file-list li { background-color: #3b3e50; padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
        #file-list li a { color: #8be9fd; text-decoration: none; }
        #file-list li a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Arquivos do Canal</h1>
        <div id="breadcrumb">Carregando...</div>
        <ul id="file-list">
            <li>Carregando...</li>
        </ul>
    </div>
    <script src="/script.js"></script>
</body>
</html>
